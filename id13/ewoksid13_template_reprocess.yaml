## ewoksid13 template reprocess.yaml
###########################

bliss_filenames:                # List of RAW_DATA files (proposal / sample / dataset files)
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s2/dq_pA_s2_roi132915_151873/dq_pA_s2_roi132915_151873.h5
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s3/dq_pA_s3_roi132922_151875/dq_pA_s3_roi132922_151875.h5
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s4/dq_pA_s4_roi132923_151877/dq_pA_s4_roi132923_151877.h5
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s5/dq_pA_s5_roi132924_151880/dq_pA_s5_roi132924_151880.h5
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s6/dq_pA_s6_roi132925_151881/dq_pA_s6_roi132925_151881.h5
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s7/dq_pA_s7_roi132926_151882/dq_pA_s7_roi132926_151882.h5
    - /data/visitor/sc5729/id13/20251202/RAW_DATA/dq_pA_s8/dq_pA_s8_roi132927_151883/dq_pA_s8_roi132927_151883.h5

scans:                          # List of scan numbers (if empty, takes all)
    - 1
    #- 2
    #- !slice 1:10              # Slice option: it will iterate between scans 1 and 10 (included)

tag:                            # Additional suffix to the output files (overwritting is forbidden)
output_root:                    # Root folder to save the output files (if empty, replace RAW_DATA -> PROCESSED_DATA)
save_separate_files: False      # If True, generates an output file per scan

pyfai_configs:                  # Several pyFAI integrations can be done in the same template
    - name:                     # name could be empty, but only one configuration name can be empty
                                # filename is the pyfai .json with all the integration parameters
      filename:  /data/visitor/sc5729/id13/20251202/PROCESSED_DATA/config_udetx_m800.json 

    # - name: 2nd_config
    #   filename: /something/config2.json

    # - name: 1st_quarter
    #   filename: /something/config_poni.poni
    #   unit: 2th_deg
    #   nbpt_rad : 1000
    #   azimuth_range: [0, 90]

# Workflow parameters
do_diffmap: False                # DiffractionMap: Reconstruction of the ROI collected with Daiquiri / kmap
do_average: True                # Calculate the average + Bragg reflections from a reference
do_stackedf: True               # Generate .edf file for XRDUA post-analysis
normalization_counter:          # Bliss monitor counter to be used on the diffmap task
dark_value: 0.0                 # Offset for the monitor to be used on the diffmap task
average_reference: ""           # Name of the standard to be used on the average task

# Background/NN parameters
do_background: False            # Substract an automatic background from the diffractograms
do_cnmf: False                  # Runs Constrained Non-negative Matrix Factorization
#radial_limits : [5,40]          # 2theta limits (to skip low and high 2theta useless values)
references_directory: ""        # Path where the .cif files are stored

# Submit parameters
submit: True                    # If False, it will save the instructions without submitting the job
slurm_job_parameters:           # Some SLURM parameters to be tweak if the job fails
    time_limit: 03:00:00
    memory_per_cpu: 50GB
