<body>

<div class="container">
    <div class="card">
        <h1>LRPhoton Issue Report</h1>

        <p>
            Describe the issue and optionally attach a screenshot.
        </p>

        <form
            action="https://formsubmit.co/gupijo"
            method="POST"
            enctype="multipart/form-data"
        >

            <input type="hidden" name="_subject" value="LRPhoton Issue Report">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_next" value="about:blank">

            <label for="description">Description</label>
            <textarea
                id="description"
                name="message"
                placeholder="Describe the issue here..."
                required
            ></textarea>

            <label for="attachment">Screenshot</label>
            <input
                id="attachment"
                type="file"
                name="attachment"
                accept="image/png,image/jpeg"
            >

            <div class="preview" id="preview">
                <img id="previewImage" alt="Screenshot preview">
            </div>

            <button type="submit">
                Send Report
            </button>
        </form>

        <div class="footer">
            LRPhoton automatic issue reporting
        </div>
    </div>
</div>

<script>
    const attachmentInput = document.getElementById("attachment");
    const preview = document.getElementById("preview");
    const previewImage = document.getElementById("previewImage");

    attachmentInput.addEventListener("change", (event) => {
        const file = event.target.files[0];

        if (!file) {
            preview.style.display = "none";
            previewImage.src = "";
            return;
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            previewImage.src = e.target.result;
            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    });
</script>

</body>
